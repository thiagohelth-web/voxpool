<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - Entrar</title>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #111827; border: 1px solid #374151; padding: 30px; border-radius: 12px; width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #3b82f6; margin-bottom: 20px; }
        input { background: #1f2937; border: 1px solid #374151; color: white; padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .alternar { margin-top: 15px; font-size: 14px; color: #9ca3af; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-card">
        <h2 id="tela-titulo">VoxPopuli Login</h2>
        <input type="text" id="user-id" placeholder="Digite seu ID de Usuário">
        <input type="password" id="user-senha" placeholder="Digite sua Senha">
        <button onclick="executarAcao()" id="btn-acao">Entrar na Plataforma</button>
        <div class="alternar" onclick="alternarModo()" id="btn-alternar">Não tem conta? Cadastre-se aqui</div>
    </div>

    <script>
        const SUPABASE_URL = "https://xxxzluqjgqwkpzjjxpbj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4eHpsdXFqZ3F3a3B6amp4cGJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MTA2NjcsImV4cCI6MjA5ODE4NjY2N30.VzGPY5L8EhKt7-ARJaShpM6mMl8kA2tlRG_S4dtUPzc";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let modoLogin = true;

        function alternarModo() {
            modoLogin = !modoLogin;
            document.getElementById('tela-titulo').innerText = modoLogin ? "VoxPopuli Login" : "Criar Nova Conta";
            document.getElementById('btn-acao').innerText = modoLogin ? "Entrar na Plataforma" : "Concluir Cadastro";
            document.getElementById('btn-alternar').innerText = modoLogin ? "Não tem conta? Cadastre-se aqui" : "Já tem conta? Faça Login";
        }

        async function executarAcao() {
            const id = document.getElementById('user-id').value.trim();
            const senha = document.getElementById('user-senha').value.trim();

            if(!id || !senha) { alert("Preencha todos os campos!"); return; }

            if (modoLogin) {
                if(id === 'admin' && senha === 'admin123') {
                    localStorage.setItem('vox_usuario', 'admin');
                    window.location.href = 'adm.html';
                    return;
                }
                const { data, error } = await supabase.from('membros').select('*').eq('id', id).eq('senha', senha).single();
                if(error || !data) { alert("Usuário ou senha incorretos!"); } 
                else {
                    localStorage.setItem('vox_usuario', id);
                    window.location.href = 'dashboard.html';
                }
            } else {
                const { data: existente } = await supabase.from('membros').select('id').eq('id', id).maybeSingle();
                if(existente) { alert("Este ID já está em uso!"); return; }

                const { error } = await supabase.from('membros').insert([{ id, senha, saldo: 100.00 }]);
                if(error) { alert("Erro ao cadastrar!"); } 
                else { alert("Cadastro realizado com sucesso! Faça o login."); alternarModo(); }
            }
        }
    </script>
</body>
</html>
