<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - Entrar</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --bg-input: #1f2937;
            --primary-blue: #2563eb;
            --accent-green: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 { text-align: center; margin-bottom: 24px; color: #3b82f6; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }
        input:focus { border-color: var(--primary-blue); outline: none; }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover { background: #1d4ed8; }
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            text-decoration: underline;
        }
        .toggle-link:hover { color: var(--text-main); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="login-card">
        <h2 id="titulo-tela">VoxPopuli Login</h2>
        
        <div class="input-group">
            <label for="usuario">ID de Usuário</label>
            <input type="text" id="usuario" placeholder="Digite seu ID de Usuário">
        </div>

        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite sua Senha">
        </div>

        <button class="btn" id="btn-acao" onclick="executarAcao()">Entrar na Plataforma</button>
        
        <div class="toggle-link" id="link-alternar" onclick="toggleModo()">Não tem conta? Cadastre-se aqui</div>
    </div>

    <script>
        // ATENÇÃO: Certifique-se de que estas chaves abaixo condizem com as do seu painel Supabase
        const SUPABASE_URL = "https://xxxzluqjgqwkpzjjxpbj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4eHpsdXFqZ3F3a3B6amp4cGJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MTA2NjcsImV4cCI6MjA5ODE4NjY2N30.VzGPY5L8EhKt7-ARJaShpM6mMl8kA2tlRG_S4dtUPzc";
        
        let clientSupabase = null;
        
        // Inicializa o Supabase tratando possíveis erros de credenciais
        try {
            clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Erro ao inicializar Supabase:", e);
        }

        let modoCadastro = false;

        function toggleModo() {
            modoCadastro = !modoCadastro;
            const titulo = document.getElementById('titulo-tela');
            const btn = document.getElementById('btn-acao');
            const link = document.getElementById('link-alternar');

            if(modoCadastro) {
                titulo.innerText = "Criar Nova Conta";
                btn.innerText = "Concluir Cadastro";
                link.innerText = "Já tem uma conta? Faça Login";
                btn.style.background = "var(--accent-green)";
            } else {
                titulo.innerText = "VoxPopuli Login";
                btn.innerText = "Entrar na Plataforma";
                link.innerText = "Não tem conta? Cadastre-se aqui";
                btn.style.background = "var(--primary-blue)";
            }
        }

        async function executarAcao() {
            const userIn = document.getElementById('usuario').value.trim();
            const passIn = document.getElementById('senha').value.trim();

            if(!userIn || !passIn) {
                alert("Por favor, preencha todos os campos!");
                return;
            }

            // LOGIN DE ADMINISTRADOR LOCAL (Ignora falhas de conexão para garantir o seu acesso)
            if(!modoCadastro && userIn === 'admin' && passIn === 'admin123') {
                localStorage.setItem('vox_usuario', 'admin');
                window.location.href = 'adm.html';
                return;
            }

            // Se for tentar usar o banco e o client falhou na inicialização
            if(!clientSupabase) {
                alert("Erro de conexão: O banco de dados Supabase não foi configurado corretamente.");
                return;
            }

            if(modoCadastro) {
                // Impede criação de contas maliciosas ou erradas com o ID admin
                if(userIn.toLowerCase() === 'admin') { 
                    alert("O nome 'admin' é reservado e não pode ser cadastrado!"); 
                    return; 
                }

                try {
                    // Verifica se usuário já existe
                    const { data: existente, error: errCheck } = await clientSupabase.from('membros').select('id').eq('id', userIn).maybeSingle();
                    
                    if(errCheck) throw errCheck;

                    if(existente) {
                        alert("Este ID de usuário já está sendo usado!");
                        return;
                    }

                    // Insere novo membro
                    const { error: errInsert } = await clientSupabase.from('membros').insert([{ id: userIn, senha: passIn, saldo: 100.00 }]);
                    
                    if(errInsert) throw errInsert;

                    alert("Cadastro realizado com sucesso! Ganhou 100 moedas de bônus.");
                    toggleModo();
                    
                } catch (error) {
                    alert("Erro retornado pelo Supabase: " + (error.message || error));
                }
            } else {
                try {
                    // REGRA DE LOGIN DO MEMBRO COMUM
                    const { data: membro, error: errLogin } = await clientSupabase.from('membros').select('*').eq('id', userIn).maybeSingle();
                    
                    if(errLogin) throw errLogin;

                    if(!membro || membro.senha !== passIn) {
                        alert("ID de usuário ou senha incorretos!");
                    } else {
                        localStorage.setItem('vox_usuario', membro.id);
                        window.location.href = 'dashboard.html';
                    }
                } catch (error) {
                    alert("Erro ao conectar para Login: " + (error.message || error));
                }
            }
        }
    </script>
</body>
</html>
