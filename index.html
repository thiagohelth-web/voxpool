<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - Autenticação</title>
    <style>
        :root { --bg: #0b0f19; --card: #111827; --blue: #2563eb; --text: #f3f4f6; --border: #374151; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-container { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 12px; max-width: 400px; width: 100%; }
        .logo { font-size: 28px; font-weight: bold; color: #3b82f6; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #9ca3af; }
        input { width: 100%; padding: 12px; background: #1f2937; border: 1px solid var(--border); border-radius: 6px; color: white; font-size: 14px; }
        .btn-auth { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .switch-auth { text-align: center; margin-top: 20px; font-size: 13px; color: #9ca3af; }
        .switch-auth a { color: #60a5fa; cursor: pointer; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="auth-container">
    <div class="logo">VoxPopuli 📈</div>
    
    <div id="area-login">
        <h3 style="margin-bottom: 15px; text-align: center;">Acessar Painel</h3>
        <div class="form-group">
            <label>Usuário / ID</label>
            <input type="text" id="login-usuario" placeholder="Digite seu usuário">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="login-senha" placeholder="Digite sua senha">
        </div>
        <button class="btn-auth" onclick="realizarLogin()">Entrar no Painel</button>
        <div class="switch-auth">Não tem conta? <a onclick="alternarTelas(true)">Cadastre-se</a></div>
    </div>

    <div id="area-cadastro" style="display: none;">
        <h3 style="margin-bottom: 15px; text-align: center; color: #60a5fa;">Criar Conta</h3>
        <div class="form-group">
            <label>Usuário / ID</label>
            <input type="text" id="cad-usuario" placeholder="Ex: trader_joao">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="cad-senha" placeholder="Crie sua senha">
        </div>
        <div class="form-group">
            <label>Chave PIX (Para Saques)</label>
            <input type="text" id="cad-pix" placeholder="Sua chave PIX">
        </div>
        <button class="btn-auth" style="background: #10b981;" onclick="realizarCadastro()">Finalizar Cadastro</button>
        <div class="switch-auth">Já possui conta? <a onclick="alternarTelas(false)">Fazer Login</a></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://xxxzluqjgqwkpzjjxpbj.supabase.co";
    const SUPABASE_KEY = "SUA_CHAVE_ANON_AQUI";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function alternarTelas(mostrar) {
        document.getElementById('area-login').style.display = mostrar ? 'none' : 'block';
        document.getElementById('area-cadastro').style.display = mostrar ? 'block' : 'none';
    }

    async function realizarLogin() {
        const usu = document.getElementById('login-usuario').value.trim();
        const sen = document.getElementById('login-senha').value.trim();

        if (usu === "adm" && sen === "adm123") {
            localStorage.setItem('vox_usuario', 'adm');
            window.location.href = 'adm.html';
            return;
        }

        const { data: membro } = await supabase.from('membros').select('*').eq('id', usu).maybeSingle();
        if (!membro || membro.senha !== sen) return alert("Usuário ou senha inválidos!");
        if (membro.status === "bloqueado") return alert("Conta bloqueada pelo ADM.");

        localStorage.setItem('vox_usuario', membro.id);
        window.location.href = 'dashboard.html';
    }

    async function realizarCadastro() {
        const usu = document.getElementById('cad-usuario').value.trim();
        const sen = document.getElementById('cad-senha').value.trim();
        const pix = document.getElementById('cad-pix').value.trim();

        if (!usu || !sen || !pix) return alert("Preencha todos os campos!");

        const { error } = await supabase.from('membros').insert([{
            id: usu, senha: sen, chave_pix: pix, saldo: 0, status: 'ativo'
        }]);

        if (error) alert("Erro: " + error.message);
        else {
            alert("Sucesso! Faça login.");
            alternarTelas(false);
        }
    }
</script>
</body>
</html>
