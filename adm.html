<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VoxPopuli - ADM Central</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-main: #0b0f19; --bg-card: #111827; --primary-blue: #2563eb; --accent-green: #10b981; --accent-red: #ef4444; }
        body { background-color: var(--bg-main); color: #f3f4f6; font-family: sans-serif; padding: 20px; }
        .secao-adm { background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #374151; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #374151; text-align: left; }
        button { cursor: pointer; padding: 6px 12px; border-radius: 4px; border: none; color: white; }
    </style>
</head>
<body>
    <header><h1>VoxPopuli Central [ADM]</h1></header>
    <div style="max-width: 1100px; margin: 0 auto;">
        
        <div class="secao-adm">
            <h3>💰 Aprovação de Depósitos</h3>
            <table id="tabela-recargas"></table>
        </div>

        <div class="secao-adm">
            <h3>📤 Pedidos de Saque</h3>
            <table id="tabela-saques"></table>
        </div>

        <div class="secao-adm">
            <h3>📝 Injetar Nova Previsão</h3>
            <select id="enq-categoria" onchange="ajustarFormulario()">
                <option value="Mercado Financeiro">📈 Mercado Financeiro</option>
                <option value="Esporte">⚽ Esporte</option>
            </select>
            <div id="campos-dinamicos" style="margin: 10px 0;"></div>
            <button class="btn-adm" onclick="injetarEnquete()" style="background:var(--primary-blue)">Injetar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://xxxzluqjgqwkpzjjxpbj.supabase.co";
        const SUPABASE_KEY = "SUA_CHAVE_ANON_AQUI"; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarAdmin() {
            // 1. Carregar Depósitos
            const { data: recargas } = await supabase.from('depositos').select('*');
            const tRec = document.getElementById('tabela-recargas');
            tRec.innerHTML = recargas ? recargas.map(r => `
                <tr>
                    <td>${r.membro_id || 'N/A'}</td>
                    <td>${r.valor}</td>
                    <td><button onclick="aprovarRecarga('${r.id}', '${r.membro_id}', ${r.valor})">Aprovar</button></td>
                </tr>
            `).join('') : '<tr><td>Nenhum</td></tr>';

            // 2. Carregar Saques
            const { data: saques } = await supabase.from('saques').select('*').eq('status', 'PENDENTE');
            const tSaq = document.getElementById('tabela-saques');
            tSaq.innerHTML = saques ? saques.map(s => `
                <tr>
                    <td>${s.membro_id}</td>
                    <td>${s.valor}</td>
                    <td><button onclick="finalizarSaque('${s.id}', '${s.membro_id}', ${s.valor})">Pagar</button></td>
                </tr>
            `).join('') : '<tr><td>Nenhum</td></tr>';
        }

        async function aprovarRecarga(id, membroId, valor) {
            const { data: m } = await supabase.from('membros').select('saldo').eq('id', membroId).single();
            await supabase.from('membros').update({ saldo: parseFloat(m.saldo) + parseFloat(valor) }).eq('id', membroId);
            await supabase.from('depositos').update({ status: 'APROVADO' }).eq('id', id);
            alert("Aprovado!");
            carregarAdmin();
        }

        function ajustarFormulario() {
            const cat = document.getElementById('enq-categoria').value;
            const container = document.getElementById('campos-dinamicos');
            container.innerHTML = cat === "Mercado Financeiro" 
                ? `<input id="enq-ativo" placeholder="Ex: WIN1!">` 
                : `<input id="enq-pergunta" placeholder="Ex: Flamengo vs Vasco">`;
        }

        carregarAdmin();
    </script>
</body>
</html>
