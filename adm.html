<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - ADM Central</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --bg-input: #1f2937;
            --primary-blue: #2563eb;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --text-main: #f3f4f6;
            --border-color: #374151;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: #3b82f6; }
        .btn-sair { background: #374151; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .secao-adm { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        h3 { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        input, select { flex: 1; min-width: 150px; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 6px; color: white; font-size: 14px; }
        .btn-adm { width: 100%; padding: 12px; background: var(--primary-blue); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid var(--border-color); padding: 12px; text-align: left; }
        .btn-resolver { background: var(--accent-green); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-del { background: var(--accent-red); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #374151; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="logo">VoxPopuli Central [ADM]</div>
        <button class="btn-sair" onclick="deslogar()">Sair</button>
    </header>

    <div style="max-width: 1000px; margin: 0 auto;">
        
        <!-- Aprovação de Recargas -->
        <div class="secao-adm" style="border-color: var(--accent-green);">
            <h3 style="color: var(--accent-green);">💰 Aprovação de Recargas (Mín. 9 Moedas)</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID do Membro</th>
                        <th>Moedas Solicitadas</th>
                        <th>Valor Equivalente</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-recargas"></tbody>
            </table>
        </div>
        
        <!-- Formulário Inteligente de Nova Enquete -->
        <div class="secao-adm">
            <h3>📝 Injetar Nova Previsão por Categoria</h3>
            <div class="form-row">
                <select id="enq-categoria" onchange="ajustarFormulario()">
                    <option value="Mercado Financeiro">📈 Mercado Financeiro</option>
                    <option value="Política">🏛️ Política</option>
                    <option value="Esporte">⚽ Esporte</option>
                    <option value="Conhecimentos Gerais">🧠 Conhecimentos Gerais</option>
                </select>
            </div>
            
            <!-- Campos Dinâmicos (Ativos selecionáveis vs Texto Livre) -->
            <div class="form-row" id="campos-dinamicos">
                <!-- Inicializa montado com a lista de Mercado Financeiro -->
                <select id="enq-ativo">
                    <option value="" disabled selected>Escolha o Ativo Comercial...</option>
                    <option value="GOLD">🏆 FOREX: GOLD (Ouro)</option>
                    <option value="EURUSD">💱 FOREX: EUR/USD</option>
                    <option value="GBPUSD">💱 FOREX: GBP/USD</option>
                    <option value="BTCUSD">🪙 CRIPTO: BITCOIN (BTC/USD)</option>
                    <option value="ETHUSD">🪙 CRIPTO: ETHEREUM (ETH/USD)</option>
                    <option value="SOLUSD">🪙 CRIPTO: SOLANA (SOL/USD)</option>
                    <option value="KLBN11">📊 B3 AÇÃO: KLABIN (KLBN11)</option>
                    <option value="PETR4">📊 B3 AÇÃO: PETROBRAS (PETR4)</option>
                    <option value="VALE3">📊 B3 AÇÃO: VALE (VALE3)</option>
                    <option value="ITUB4">📊 B3 AÇÃO: ITAÚ (ITUB4)</option>
                    <option value="SPX">🇺🇸 ÍNDICE: S&P 500</option>
                </select>
                <input type="text" id="enq-fechamento" placeholder="Preço de Fechamento de Ontem (Ex: 1.08500)">
            </div>
            
            <button class="btn-adm" onclick="injetarEnquete()">Injetar na Categoria Selecionada</button>
        </div>

        <!-- Tabela de Apuração -->
        <div class="secao-adm" style="border-color: var(--primary-blue);">
            <h3 style="color: #60a5fa;">🎲 Encerramento e Apuração Matemática</h3>
            <table>
                <thead>
                    <tr>
                        <th>Categoria</th>
                        <th>Previsão / Ativo</th>
                        <th>Opções / Referência</th>
                        <th>Definir Vencedor (Pagar Lucros)</th>
                    </tr>
                </thead>
                <tbody id="tabela-enquetes"></tbody>
            </table>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://xxxzluqjgqwkpzjjxpbj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4eHpsdXFqZ3F3a3B6amp4cGJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MTA2NjcsImV4cCI6MjA5ODE4NjY2N30.VzGPY5L8EhKt7-ARJaShpM6mMl8kA2tlRG_S4dtUPzc";
        
        const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function deslogar() {
            localStorage.removeItem('vox_usuario');
            window.location.href = 'index.html';
        }

        function ajustarFormulario() {
            const cat = document.getElementById('enq-categoria').value;
            const container = document.getElementById('campos-dinamicos');
            
            if (cat === "Mercado Financeiro") {
                container.innerHTML = `
                    <select id="enq-ativo">
                        <option value="" disabled selected>Escolha o Ativo Comercial...</option>
                        <option value="GOLD">🏆 FOREX: GOLD (Ouro)</option>
                        <option value="EURUSD">💱 FOREX: EUR/USD</option>
                        <option value="GBPUSD">💱 FOREX: GBP/USD</option>
                        <option value="BTCUSD">🪙 CRIPTO: BITCOIN (BTC/USD)</option>
                        <option value="ETHUSD">🪙 CRIPTO: ETHEREUM (ETH/USD)</option>
                        <option value="SOLUSD">🪙 CRIPTO: SOLANA (SOL/USD)</option>
                        <option value="KLBN11">📊 B3 AÇÃO: KLABIN (KLBN11)</option>
                        <option value="PETR4">📊 B3 AÇÃO: PETROBRAS (PETR4)</option>
                        <option value="VALE3">📊 B3 AÇÃO: VALE (VALE3)</option>
                        <option value="ITUB4">📊 B3 AÇÃO: ITAÚ (ITUB4)</option>
                        <option value="SPX">🇺🇸 ÍNDICE: S&P 500</option>
                    </select>
                    <input type="text" id="enq-fechamento" placeholder="Preço de Fechamento de Ontem (Ex: 1.08500)">
                `;
            } else {
                container.innerHTML = `
                    <input type="text" id="enq-pergunta" placeholder="Digite a pergunta da previsão">
                    <input type="text" id="enq-op1" placeholder="Opção 1">
                    <input type="text" id="enq-op2" placeholder="Opção 2">
                `;
            }
        }

        async function carregarAdmin() {
            try {
                // 1. Pedidos de Recarga
                const { data: recargas } = await clientSupabase.from('pedidos_recarga').select('*').eq('status', 'pendente');
                const tabelaRecargas = document.getElementById('tabela-recargas');
                tabelaRecargas.innerHTML = "";
                if (!recargas || recargas.length === 0) {
                    tabelaRecargas.innerHTML = "<tr><td colspan='4' style='text-align:center; color:gray;'>Nenhuma solicitação pendente.</td></tr>";
                } else {
                    recargas.forEach(rec => {
                        const valor = parseFloat(rec.quantidade_moedas);
                        tabelaRecargas.innerHTML += `<tr><td><b>${rec.membro_id}</b></td><td style="color:var(--accent-green); font-weight:bold;">${valor} Moedas</td><td>R$ ${valor.toFixed(2)}</td><td><button class="btn-resolver" onclick="aprovarRecarga('${rec.id}', '${rec.membro_id}', ${valor})">Aceitar</button><button class="btn-del" onclick="rejeitarRecarga('${rec.id}')">Recusar</button></td></tr>`;
                    });
                }

                // 2. Previsões Ativas
                const { data: enquetes } = await clientSupabase.from('enquetes').select('*');
                const tabela = document.getElementById('tabela-enquetes');
                tabela.innerHTML = "";

                if(!enquetes || enquetes.length === 0) {
                    tabela.innerHTML = "<tr><td colspan='4' style='text-align:center; color:gray;'>Nenhuma previsão aberta.</td></tr>";
                    return;
                }

                enquetes.forEach(enq => {
                    const categoria = enq.categoria || "Mercado Financeiro";
                    let o1 = "Opção 1", o2 = "Opção 2";
                    let exibicao = enq.pergunta;

                    if (enq.pergunta.includes("[") && enq.pergunta.includes("vs")) {
                        try {
                            const partes = enq.pergunta.split(" [");
                            exibicao = partes[0];
                            const opcoesRaw = partes[1].replace("]", "").split(" vs ");
                            o1 = opcoesRaw[0]; o2 = opcoesRaw[1];
                        } catch(e){}
                    }

                    tabela.innerHTML += `
                        <tr>
                            <td><span class="badge">${categoria}</span></td>
                            <td><b>${exibicao}</b></td>
                            <td>1: ${o1} <br> 2: ${o2}</td>
                            <td>
                                <button class="btn-resolver" onclick="apurarEnquete('${enq.id}', '1')">${o1} Ganhou</button>
                                <button class="btn-resolver" onclick="apurarEnquete('${enq.id}', '2')" style="background:#3b82f6;">${o2} Ganhou</button>
                                <button class="btn-del" onclick="deletarEnquete('${enq.id}')">Excluir</button>
                            </td>
                        </tr>
                    `;
                });
            } catch(e) { console.error(e); }
        }

        async function injetarEnquete() {
            const categoria = document.getElementById('enq-categoria').value;
            let perguntaFinal = "";

            if (categoria === "Mercado Financeiro") {
                const ativoSelect = document.getElementById('enq-ativo');
                const ativo = ativoSelect.value;
                const fechamento = document.getElementById('enq-fechamento').value.trim();
                
                if(!ativo) { alert("Por favor, selecione um ativo da lista!"); return; }
                if(!fechamento) { alert("Preencha o preço de fechamento!"); return; }
                
                // Monta o padrão correto interpretado pelo dashboard do membro
                perguntaFinal = `${ativo} [f: ${fechamento} vs ACIMA vs ABAIXO]`;
            } else {
                const p = document.getElementById('enq-pergunta').value.trim();
                const o1 = document.getElementById('enq-op1').value.trim();
                const o2 = document.getElementById('enq-op2').value.trim();
                if(!p || !o1 || !o2) { alert("Preencha todos os campos da pergunta!"); return; }
                perguntaFinal = `${p} [${o1} vs ${o2}]`;
            }

            const { error } = await clientSupabase.from('enquetes').insert([{ pergunta: perguntaFinal, categoria: categoria }]);
            if(error) { alert("Erro ao salvar no banco: " + error.message); return; }

            alert("Previsão injetada com sucesso!");
            ajustarFormulario();
            carregarAdmin();
        }

        async function aprovarRecarga(pedidoId, membroId, valorMoedas) {
            const { data: m } = await clientSupabase.from('membros').select('saldo').eq('id', membroId).maybeSingle();
            let saldoAtual = m ? parseFloat(m.saldo) : 0;
            await clientSupabase.from('membros').update({ saldo: saldoAtual + valorMoedas }).eq('id', membroId);
            await clientSupabase.from('pedidos_recarga').update({ status: 'aprovado' }).eq('id', pedidoId);
            alert("Recarga liberada!");
            carregarAdmin();
        }

        async function rejeitarRecarga(pedidoId) {
            if (confirm("Recusar pedido de crédito?")) {
                await clientSupabase.from('pedidos_recarga').delete().eq('id', pedidoId);
                carregarAdmin();
            }
        }

        async function apurarEnquete(enqueteId, opcaoVencedora) {
            try {
                const { data: apostas } = await clientSupabase.from('historico_apostas').select('*').eq('enquete_id', enqueteId.toString());
                if (apostas && apostas.length > 0) {
                    for (const aposta of apostas) {
                        const valorTotal = parseFloat(aposta.valor_total);
                        let retornoCalculado = aposta.opcao_escolhida === opcaoVencedora.toString() ? valorTotal * 1.49 : valorTotal * 0.39;
                        const { data: m } = await clientSupabase.from('membros').select('saldo').eq('id', aposta.membro_id).maybeSingle();
                        if (m) {
                            await clientSupabase.from('membros').update({ saldo: parseFloat(m.saldo) + retornoCalculado }).eq('id', aposta.membro_id);
                        }
                    }
                    await clientSupabase.from('historico_apostas').delete().eq('enquete_id', enqueteId.toString());
                }
                await clientSupabase.from('enquetes').delete().eq('id', enqueteId);
                alert("Apuração concluída! Prêmios e mitigações distribuídos com sucesso.");
                carregarAdmin();
            } catch (err) { console.error(err); }
        }

        async function deletarEnquete(id) {
            if(confirm("Deseja realmente excluir essa previsão permanentemente?")) {
                await clientSupabase.from('historico_apostas').delete().eq('enquete_id', id.toString());
                await clientSupabase.from('enquetes').delete().eq('id', id);
                carregarAdmin();
            }
        }

        carregarAdmin();
    </script>
</body>
</html>
